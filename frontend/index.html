<!DOCTYPE html>
<html>
<head>
  <title>Smart News System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>📰 Smart News Analysis & Recommendation System</h1>

  <div style="margin-bottom: 20px;">
    <a href="dashboard.html" style="font-size:18px;">📊 Go to Dashboard</a>
  </div>

  <h2>🔥 Trending News</h2>
  <div id="trending"></div>

  <h2>📰 All Articles</h2>
  <div id="articles"></div>

  <script>
    const API = "http://127.0.0.1:5000";

    async function loadTrending() {
      let res = await fetch(`${API}/trending`);
      let data = await res.json();

      let html = "";

      if (data.length === 0) {
        html = "<p>No trending articles yet.</p>";
      } else {
        data.forEach(a => {
          html += `
            <div class="card">
              <h3>${a.title}</h3>
              <p><b>Category:</b> ${a.category}</p>
              <p><b>Fake:</b> ${a.is_fake ? "⚠️ YES (Fake News)" : "✅ NO (Real News)"}</p>
              <p><b>Trending Score:</b> ${a.score.toFixed(2)}</p>

              <a href="article.html?id=${a.article_id}">
                <button>Read Full Article</button>
              </a>
            </div>
          `;
        });
      }

      document.getElementById("trending").innerHTML = html;
    }

    async function loadArticles() {
      let res = await fetch(`${API}/articles`);
      let data = await res.json();

      let html = "";

      if (data.length === 0) {
        html = "<p>No articles found. Add some articles first.</p>";
      } else {
        data.forEach(a => {
          html += `
            <div class="card">
              <h3>${a.title}</h3>
              <p>${a.content.substring(0, 150)}...</p>

              <p><b>Category:</b> ${a.category}</p>
              <p><b>Status:</b> ${a.is_fake ? "⚠️ Fake News" : "✅ Real News"}</p>

              <a href="article.html?id=${a.article_id}">
                <button>Read</button>
              </a>

              <button onclick="likeArticle(${a.article_id})">👍 Like</button>
            </div>
          `;
        });
      }

      document.getElementById("articles").innerHTML = html;
    }

    async function likeArticle(articleId) {
      await fetch(`${API}/like/${articleId}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: 1 })
      });

      alert("✅ Article Liked!");
      loadTrending(); // refresh trending scores
    }

    loadTrending();
    loadArticles();
  </script>

</body>
</html>
